version: "3.9"

# Local development compose file.
# Usage:
#   cp .env.example .env   # fill in your keys
#   docker compose up --build

services:
  rootsy-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rootsy-api:dev
    container_name: rootsy-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: "8000"
      WORKERS: "1"
      LOG_LEVEL: "debug"
    env_file:
      - .env
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
